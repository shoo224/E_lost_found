# render.yaml - Render deployment configuration for E Lost & Found backend
# Deploy using: git push (with render.yaml in root)

services:
  - type: web
    name: elostfound-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT app.main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "8000"
      # DO NOT commit sensitive values to git!
      # Set these in Render Dashboard > Environment > Environment Variables:
      # - MONGODB_URI
      # - JWT_SECRET
      # - AWS_ACCESS_KEY_ID
      # - AWS_SECRET_ACCESS_KEY
      # - S3_BUCKET
      # - SES_FROM_EMAIL
      # - SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD, SMTP_FROM
      # - ADMIN_EMAILS
      # - ADMIN_PANEL_PASSWORD
      # - CORS_ORIGINS
      # - API_BASE_URL (set to your Render app URL, e.g., https://yourdomain.onrender.com)
      - key: DB_NAME
        value: elostfound
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: OTP_EXPIRE_MINUTES
        value: "10"
      - key: AWS_REGION
        value: ap-south-1
