<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claim Items - E Lost &amp; Found</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { font-family: "Lexend", sans-serif; }
  </style>
  <script>
    // Set API base URL - use same origin when backend serves frontend
    window.API_BASE_URL = 'https://e-lost-found.onrender.com';
  </script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
  <div class="layout-container flex flex-col min-h-screen">
    <header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 lg:px-10 py-3 sticky top-0 z-50">
      <div class="flex items-center gap-8">
        <h2 class="text-lg font-bold text-primary">Campus Found</h2>
        <nav class="hidden md:flex items-center gap-8">
          <a href="index.html" class="text-slate-600 dark:text-slate-300 text-sm">Home</a>
          <a href="lost.html" class="text-slate-600 dark:text-slate-300 text-sm">Report Lost</a>
          <a href="found.html" class="text-slate-600 dark:text-slate-300 text-sm">Report Found</a>
          <a href="claim.html" class="text-primary text-sm font-bold">Claim Items</a>
          <a href="admin.html" class="text-slate-600 dark:text-slate-300 text-sm">Admin</a>
        </nav>
      </div>
    </header>

    <main class="flex-1 py-8 px-4 lg:px-10">
      <div class="max-w-[1200px] mx-auto space-y-6">
        <h1 class="text-3xl font-black">Claim Section</h1>
        <p class="text-sm text-slate-600 dark:text-slate-400">
          View all reports, select one lost report and one found report, then submit a claim request for admin approval.
        </p>
        <div id="msg" class="alert hide"></div>

        <section class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800 space-y-4">
          <h2 class="text-lg font-bold">Login (OTP)</h2>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <input id="claim-email" type="email" placeholder="you@college.edu" class="rounded-lg border-slate-200 dark:border-slate-800 bg-background-light dark:bg-slate-800 px-3 py-2 text-sm" />
            <input id="claim-otp" type="text" maxlength="6" placeholder="6-digit OTP" class="rounded-lg border-slate-200 dark:border-slate-800 bg-background-light dark:bg-slate-800 px-3 py-2 text-sm" />
            <div class="flex gap-2">
              <button id="claim-send-otp" type="button" class="px-4 py-2 bg-primary/10 text-primary font-bold text-xs rounded-lg">Send OTP</button>
              <button id="claim-verify-otp" type="button" class="px-4 py-2 bg-primary text-white font-bold text-xs rounded-lg">Login</button>
            </div>
          </div>
          <p id="login-state" class="text-xs text-slate-500">Not logged in</p>
        </section>

        <section class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800 space-y-4">
          <h2 class="text-lg font-bold">Submit Claim Request</h2>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div>
              <label class="text-sm font-semibold">Select Lost Report</label>
              <select id="lost-select" class="w-full mt-1 rounded-lg border-slate-200 dark:border-slate-800 bg-background-light dark:bg-slate-800 px-3 py-2 text-sm"></select>
            </div>
            <div>
              <label class="text-sm font-semibold">Select Found Report</label>
              <select id="found-select" class="w-full mt-1 rounded-lg border-slate-200 dark:border-slate-800 bg-background-light dark:bg-slate-800 px-3 py-2 text-sm"></select>
            </div>
          </div>
          <button id="btn-submit-claim" type="button" class="bg-primary text-white font-bold py-2.5 px-4 rounded-xl text-sm">Submit Claim</button>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800">
            <h3 class="text-base font-bold mb-3">All Lost Reports</h3>
            <ul id="lost-items-list" class="space-y-2 text-sm"></ul>
          </div>
          <div class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800">
            <h3 class="text-base font-bold mb-3">All Found Reports (Users + Admin)</h3>
            <ul id="found-items-list" class="space-y-2 text-sm"></ul>
          </div>
        </section>
      </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/claim.js"></script>
  </div>
</body>
</html>
