# Nginx reverse proxy for E Lost & Found
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled, or include in http block.
# Replace your_domain.com with your EC2 public IP or domain.

server {
    listen 80;
    server_name your_domain.com;   # or EC2 public IP
    root /var/www/elostfound/frontend;
    index index.html;

    # Frontend static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to FastAPI (Uvicorn on port 8000)
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Strip /api prefix when forwarding (optional - if frontend calls /api/stats then backend must serve at /api/stats or we rewrite)
        rewrite ^/api(.*)$ $1 break;
    }

    # If frontend uses same origin and calls /stats, /auth, etc. (no /api prefix), use this instead:
    # location ~ ^/(stats|auth|lost|found|claims|admin) {
    #     proxy_pass http://127.0.0.1:8000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}

